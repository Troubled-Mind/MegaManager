<!DOCTYPE html>
<html lang="en" data-mdb-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="resources/img/logo.png" />
  <title>Mega Manager - Import</title>

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
  <!-- MDB stylesheets -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mdb-ui-kit@9.0.0/css/mdb.min.css" />
  <!-- Custom CSS styling -->
  <link rel="stylesheet" href="css/custom.css?v=0.0.1" />
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand bg-body-tertiary">
    <div class="container-fluid">
      <button
        data-mdb-collapse-init
        class="navbar-toggler"
        type="button"
        data-mdb-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <i class="fas fa-bars"></i>
      </button>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <a class="navbar-brand mt-2 mt-lg-0" href="/">
          <img
            src="resources/img/logo.png"
            height="60"
            alt="Mega Manager Logo"
            loading="lazy"
          />
        </a>
        <ul class="navbar-nav me-auto mb-2 mb-lg-0" id="navbarLinks">
          <!-- dynamically loaded from /web/navbar/links.html -->
        </ul>
      </div>
    </div>
  </nav>
  <!-- Navbar -->

  <!-- Content Section -->
  <header class="hero-gradient text-white py-4 mb-5 border-bottom border-white border-opacity-10">
    <div class="container d-flex justify-content-between align-items-center">
      <h2 class="fw-bold mb-0">Bulk Import Files/Folders</h2>
    </div>
  </header>

  <div class="container mb-5">
    <div class="row justify-content-center">
      <div class="col-12 col-xl-10 mx-auto">

        <!-- Paste links -->
        <div class="card bg-dark text-white shadow mb-4">
          <div class="card-body">
            <h5 class="card-title mb-3">Paste MEGA links (one per line):</h5>
            <textarea id="linksInput" class="form-control mb-3" rows="7" placeholder="https://mega.nz/folder/..."></textarea>
            <button id="importBtn" class="btn btn-primary w-100">Import</button>
          </div>
        </div>

        <!-- Successful imports -->
        <div class="card bg-dark text-white shadow mb-4">
          <div class="card-body">
            <h5 class="card-title mb-3">Successful Imports</h5>
              <div id="importedList" class="table-responsive">
                <table class="table table-dark table-striped">
                  <thead>
                    <tr>
                      <th><i class="fas fa-user me-2 text-secondary"></i> Account</th>
                      <th><i class="fas fa-map-marker-alt me-1"></i> Remote Path</th>
                      <th><i class="fas fa-link me-2 text-secondary"></i> Link</th>
                      <th><i class="fas fa-cloud me-1"></i> Size</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody id="importedTableBody">
                    <!-- Rows will be inserted here -->
                  </tbody>
                </table>
              </div>
          </div>
        </div>

        <!-- Failed imports -->
        <div class="card bg-dark text-white shadow mb-4">
          <div class="card-body">
            <h5 class="card-title mb-3">Failed Imports</h5>
              <div id="failedList" class="table-responsive">
                <table class="table table-dark table-striped">
                  <thead>
                    <tr>
                      <th><i class="fas fa-link me-2 text-secondary"></i> Link</th>
                      <th><i class="fas fa-cloud me-1"></i> Size</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody id="failedTableBody">
                    <!-- Rows will be inserted here -->
                  </tbody>
                </table>
              </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Universal Toast -->
  <div class="position-fixed top-0 end-0 p-3" style="z-index: 1055">
    <div id="universalToast" class="toast fade" role="alert" data-mdb-delay="4000" data-mdb-autohide="true">
      <div class="toast-body text-white" id="universalToastBody">
        <!-- Message will go here -->
      </div>
    </div>
  </div>
  
  <!-- MDB scripts -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mdb-ui-kit@9.0.0/js/mdb.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery.repeater/jquery.repeater.min.js"></script>
  <script src="scripts/include.js?v=0.0.1"></script>
  <script src="scripts/import.js?v=0.0.3"></script>
</body>

</html>
