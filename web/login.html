<!DOCTYPE html>
<html lang="en" data-mdb-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="resources/img/logo.png" />
    <title>Mega Manager</title>

    <!-- Font Awesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap"
      rel="stylesheet"
    />
    <!-- MDB stylesheets -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/mdb-ui-kit@9.0.0/css/mdb.min.css"
    />
    <!-- Custom CSS styling -->
    <link rel="stylesheet" href="css/custom.css?v=0.0.1" />
  </head>

  <body class="d-flex justify-content-center align-items-center vh-100 hero-gradient">
    <div class="card p-5 shadow-lg border-0" style="max-width: 400px; width: 100%;">
      <form id="loginForm" class="text-center">
        <img src="resources/img/logo.png" height="80" class="mb-4" alt="Mega Manager Logo" />
        <h2 class="fw-bold mb-1">Mega<span class="text-danger">Manager</span></h2>
        <p class="text-muted small mb-5">Enterprise Cloud Management Console</p>
        
        <div class="form-outline mb-4" data-mdb-input-init>
          <input type="password" id="password" class="form-control form-control-lg" placeholder="••••••••" />
          <label class="form-label text-muted" for="password">Access Key</label>
        </div>
        
        <button type="submit" class="btn btn-danger btn-lg w-100 py-3 shadow-sm mb-4">
          Authenticate <i class="fas fa-sign-in-alt ms-2 opacity-50"></i>
        </button>

        <p class="mb-0 x-small text-muted opacity-50">
          Created by <span class="text-white">TroubledMind</span> & <span class="text-white">hades-is-here</span>
        </p>
      </form>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const password = document.getElementById("password").value;
          const btn = e.target.querySelector('button');
          btn.disabled = true;
          btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Checking...';

          try {
            const res = await fetch("/run-command", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                command: "system_login",
                args: { password },
              }),
            });

            const result = await res.json();
            if (result.status === 200) {
              window.location.href = "/";
            } else {
              alert(result.message || "Invalid credentials");
            }
          } catch (err) {
            alert("Network error. Please try again.");
          } finally {
            btn.disabled = false;
            btn.innerHTML = 'Authenticate <i class="fas fa-sign-in-alt ms-2 opacity-50"></i>';
          }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/mdb-ui-kit@9.0.0/js/mdb.umd.min.js"></script>
    <script src="scripts/include.js?v=0.0.1"></script>
  </body>
</html>
